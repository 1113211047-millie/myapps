<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面大時鐘</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-center items-center font-mono">

    <a href="../index.html" class="absolute top-5 left-5 bg-slate-700 hover:bg-slate-600 text-sm px-4 py-2 rounded-lg transition">
        ← 返回應用總覽
    </a>

    <div class="text-center">
        <div id="date" class="text-xl md:text-2xl text-emerald-400 tracking-widest mb-4">YYYY年MM月DD日 星期X</div>
        <div id="clock" class="text-6xl md:text-8xl font-bold tracking-wider drop-shadow-[0_0_20px_rgba(52,211,153,0.5)]">00:00:00</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 格式化日期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = days[now.getDay()];
            
            // 格式化時間
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('date').innerText = `${year}年${month}月${date}日 ${day}`;
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
        }

        // 每秒更新一次時間
        setInterval(updateClock, 1000);
        updateClock(); // 頁面載入時先執行一次
    </script>
</body>
</html>
